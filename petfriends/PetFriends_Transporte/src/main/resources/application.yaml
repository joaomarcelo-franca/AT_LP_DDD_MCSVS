spring:
  application:
    name: petfriends-transporte

  jpa:
    hibernate:
      ddl-auto: create-drop

    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true

  datasource:
    url: jdbc:h2:mem:transporte-db
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
server:
  port: 8082